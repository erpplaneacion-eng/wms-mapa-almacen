<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas de Codigos - CHVS</title>
    <link rel="icon" type="image/png" href="corporacion-hacia-una-valle-solidaria-logo-x2.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --chvs-green: #059669;
            --chvs-green-dark: #047857;
            --chvs-blue: #175e82;
        }

        body {
            background: #f1f5f9;
        }

        .card-sheet {
            width: 11in;
            min-height: 8.5in;
            margin: 0 auto 18px auto;
            background: #fff;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.12);
            border-radius: 10px;
            padding: 8mm;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 5mm;
        }

        .tarjeta {
            position: relative;
            border: 4px solid var(--chvs-green);
            border-radius: 14px;
            background: #fff;
            padding: 8px 8px 36px 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .tarjeta h2 {
            margin: 0 0 8px 0;
            color: var(--chvs-green-dark);
            font-weight: 800;
            letter-spacing: 0.08em;
            font-size: 1rem;
            text-align: center;
        }

        .tarjeta svg {
            width: 100%;
            max-height: 62px;
        }

        .tarjeta-logo {
            position: absolute;
            right: 10px;
            bottom: 8px;
            width: 52px;
            opacity: 0.9;
        }

        @page {
            size: letter landscape;
            margin: 8mm;
        }

        @media print {
            body {
                background: #fff !important;
                margin: 0 !important;
            }

            .hide-print {
                display: none !important;
            }

            #contenedor-hojas {
                margin: 0 !important;
                padding: 0 !important;
            }

            .card-sheet {
                width: auto !important;
                min-height: calc(8.5in - 16mm) !important;
                margin: 0 !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                padding: 0 !important;
                break-after: page;
                page-break-after: always;
            }

            .card-sheet:last-child {
                break-after: auto;
                page-break-after: auto;
            }

            .tarjeta {
                border-width: 3px;
            }
        }
    </style>
</head>
<body class="min-h-screen">
    <header class="hide-print bg-[var(--chvs-blue)] text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-wrap gap-3 items-center justify-between">
            <h1 class="text-2xl font-bold">Tarjetas de Codigos para Impresion</h1>
            <div class="flex gap-2">
                <a href="index.html" class="bg-slate-100 text-slate-900 px-3 py-2 rounded-md font-semibold text-sm hover:bg-white">Volver al mapa</a>
                <button id="btn-imprimir" class="bg-emerald-500 hover:bg-emerald-600 px-3 py-2 rounded-md font-semibold text-sm">Imprimir</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <p class="hide-print text-sm text-slate-600 mb-4">
            Formato: hoja carta horizontal, 16 tarjetas por pagina (4x4), borde verde y logo CHVS en esquina inferior derecha.
        </p>

        function limpiarCodigos(raw) {
            return raw
                .split(/\s+/)
                .map((token) => token.trim().toUpperCase())
                .filter((token) => /^[A-Z]\d+$/.test(token));
        }

        function combinarCodigos(...bloques) {
            const codigos = bloques.flatMap((bloque) => limpiarCodigos(bloque));
            return [...new Set(codigos)];
        }

        function crearTarjeta(codigo) {
            const card = document.createElement('article');
            card.className = 'tarjeta';

            const titulo = document.createElement('h2');
            titulo.textContent = codigo;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('aria-label', `Codigo de barras ${codigo}`);

            const logo = document.createElement('img');
            logo.className = 'tarjeta-logo';
            logo.src = 'corporacion-hacia-una-valle-solidaria-logo-x2.png';
            logo.alt = 'CHVS';

            card.appendChild(titulo);
            card.appendChild(svg);
            card.appendChild(logo);

            JsBarcode(svg, codigo, {
                format: 'CODE128',
                width: 2.8,
                height: 108,
                fontSize: 26,
                fontOptions: 'bold',
                textMargin: 5,
                margin: 0,
                displayValue: true
            });

            return card;
        }

        function renderHojas(codigos) {
            const contenedor = document.getElementById('contenedor-hojas');
            contenedor.innerHTML = '';

            const porHoja = 16;
            for (let i = 0; i < codigos.length; i += porHoja) {
                const hoja = document.createElement('section');
                hoja.className = 'card-sheet';

                codigos.slice(i, i + porHoja).forEach((codigo) => {
                    hoja.appendChild(crearTarjeta(codigo));
                });

                contenedor.appendChild(hoja);
            }
        }

        document.getElementById('btn-imprimir').addEventListener('click', () => window.print());

        renderHojas(combinarCodigos(CODIGOS_BASE, CODIGOS_NUEVOS));
