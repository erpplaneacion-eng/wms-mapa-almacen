<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Mapa de Almacén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        /* Estilos personalizados para la cuadrícula y rotación de texto */
        .texto-vertical {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }
        
        /* Clases específicas para las dimensiones de cada Cuarto Frío */
        /* Aumentamos el ancho a 140px y alto a 95px para mejorar la lectura inicial */
        .grid-frio-g { display: grid; grid-template-columns: repeat(5, 140px); grid-template-rows: repeat(6, 95px); gap: 6px; }
        .grid-frio-h { display: grid; grid-template-columns: repeat(6, 140px); grid-template-rows: repeat(6, 95px); gap: 6px; }
        .grid-frio-i { display: grid; grid-template-columns: repeat(3, 140px); grid-template-rows: repeat(6, 95px); gap: 6px; }
        .grid-frio-j { display: grid; grid-template-columns: repeat(4, 140px); grid-template-rows: repeat(5, 95px); gap: 6px; }

        /* Scrollbar personalizado para el área de texto */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Estilos de impresión */
        @media print {
            body.modo-impresion header,
            body.modo-impresion .panel-izquierdo,
            body.modo-impresion .barra-lateral-frios,
            body.modo-impresion .titulo-visualizacion,
            body.modo-impresion .no-print {
                display: none !important;
            }
            body.modo-impresion, 
            body.modo-impresion main, 
            body.modo-impresion .panel-derecho, 
            body.modo-impresion .overflow-auto { 
                padding: 0 !important; 
                margin: 0 !important; 
                display: block !important; 
                overflow: visible !important; 
                height: auto !important;
                min-height: auto !important;
            }
            body.modo-impresion .contenedor-frios { 
                border: none !important; 
                box-shadow: none !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                display: block !important; 
            }
            body.modo-impresion .zona-frio:not(.activo-impresion) { 
                display: none !important; 
            }
            body.modo-impresion .zona-frio.activo-impresion { 
                border: none !important; 
                margin: 0 auto !important; 
                padding: 0 !important; 
                page-break-inside: avoid; 
                display: flex !important;
            }
            @page { size: landscape; margin: 0.5cm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans">

        <h1 class="text-2xl font-bold flex items-center gap-2">

            Sistema de Mapeo de Almacén WMS
        </h1>
    </header>

                <button onclick="generarMapa()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-xs px-3 py-1 rounded font-bold transition-colors">
                    Actualizar Mapa
                </button>
            </div>
            <div class="p-4 flex-1 flex flex-col">
                <p class="text-xs text-slate-500 mb-2">Edita las coordenadas (x, y) o el bloque para ver cómo se redibuja el rack en tiempo real.</p>
                <textarea id="datos-entrada" class="w-full flex-1 bg-slate-50 font-mono text-xs p-3 border border-slate-200 rounded focus:outline-none focus:border-blue-400 resize-none"></textarea>
            </div>
        </div>

        <!-- Panel Derecho: Visualización del Mapa -->
        <div class="panel-derecho w-full lg:w-2/3 bg-white rounded-lg shadow-lg flex flex-col overflow-hidden">
            <div class="titulo-visualizacion bg-slate-100 border-b border-slate-200 p-3">
                <h2 class="font-semibold text-slate-700 text-sm uppercase tracking-wider">Visualización Gráfica</h2>
            </div>
            
            <div class="p-8 flex-1 flex justify-center items-start overflow-auto bg-white">
                
                <!-- Contenedor Principal de CUARTOS FRÍOS -->

                    <!-- Barra Verde CUARTOS FRÍOS -->
                    <div class="barra-lateral-frios absolute -left-12 top-0 bottom-0 w-10 bg-green-600 flex items-center justify-center border-r-2 border-green-700 shadow-md">

                    </div>

                    <div class="flex flex-col gap-10 ml-8">
                        
                        <!-- ZONA CONGELACIÓN G -->

                            <button onclick="imprimirCuarto('zona-g')" class="no-print absolute top-2 right-2 bg-slate-200 hover:bg-slate-300 text-slate-700 p-2 rounded text-xs font-bold flex items-center gap-1 transition-colors shadow-sm" title="Imprimir cuarto G">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                Imprimir

                                Imprimir

                                Imprimir
                            </button>

                                <span class="texto-vertical text-slate-700 font-bold tracking-wider">REFRIGERACIÓN I</span>
                            </div>
                            <div id="grid-refrigeracion-i" class="grid-frio-i relative"></div>
                        </div>

                        <!-- ZONA REFRIGERACIÓN J -->
                        <div id="zona-j" class="zona-frio flex border border-slate-300 p-4 relative bg-slate-50">

                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                Imprimir
                            </button>
                            <div class="w-10 flex items-center justify-center mr-4">
                                <span class="texto-vertical text-slate-700 font-bold tracking-wider">REFRIGERACIÓN J</span>
                            </div>
                            <div id="grid-refrigeracion-j" class="grid-frio-j relative"></div>
                        </div>

                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- Modal para código de barras ampliado -->
    <div id="modal-barcode" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 backdrop-blur-sm" onclick="cerrarModal()">
        <div class="bg-white p-8 rounded-xl shadow-2xl flex flex-col items-center max-w-md w-full transform scale-95 transition-transform duration-300" onclick="event.stopPropagation()">
            <div class="flex justify-between w-full mb-6 border-b pb-2">
                <h3 id="modal-title" class="text-3xl font-bold text-slate-800 tracking-wider">Código</h3>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-red-500 font-bold text-2xl transition-colors">&times;</button>
            </div>
            <div class="bg-white p-4 border-4 border-slate-200 rounded-lg w-full flex justify-center">
                <svg id="modal-svg" class="w-full h-auto max-h-48"></svg>
            </div>
            <div class="mt-6 w-full bg-slate-100 p-3 rounded text-center border border-slate-200">
                <p id="modal-subtitle" class="text-sm font-semibold text-slate-600 uppercase tracking-widest"></p>
            </div>
            <button onclick="cerrarModal()" class="mt-6 w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md">
                Cerrar (O presiona afuera)

        document.getElementById('datos-entrada').value = JSON.stringify(datosMuestra, null, 2);

        function generarMapa() {
            try {
                const textoDatos = document.getElementById('datos-entrada').value;
                const datos = JSON.parse(textoDatos);

                const gridCongelacionG = document.getElementById('grid-congelacion-g');
                const gridCongelacionH = document.getElementById('grid-congelacion-h');
                const gridRefrigeracionI = document.getElementById('grid-refrigeracion-i');
                const gridRefrigeracionJ = document.getElementById('grid-refrigeracion-j');

                gridCongelacionG.innerHTML = '';
                gridCongelacionH.innerHTML = '';
                gridRefrigeracionI.innerHTML = '';
                gridRefrigeracionJ.innerHTML = '';

                datos.forEach(item => {
                    const caja = document.createElement('div');
                    caja.className = 'bg-white flex items-center justify-center border-2 border-green-700 shadow-sm hover:bg-slate-100 cursor-pointer transition-colors rounded p-1 overflow-hidden';
                    caja.title = `Ubicación: ${item.codigo} | Nivel: ${item.y} | Columna: ${item.x}`;

                    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                    svg.style.maxWidth = '100%';
                    svg.style.maxHeight = '100%';
                    caja.appendChild(svg);

                    const columnaPantalla = item.x + (item.bloque - 1);
                    
                    let filaPantalla;
                    if (['CONGELACION_G', 'CONGELACION_H', 'REFRIGERACION_I'].includes(item.zona)) {
                        filaPantalla = 7 - item.y;
                    } else if (item.zona === 'REFRIGERACION_J') {
                        filaPantalla = 6 - item.y;
                    } else {
                        filaPantalla = 4 - item.y;
                    }

                    caja.style.gridColumn = columnaPantalla;
                    caja.style.gridRow = filaPantalla;

                    caja.onclick = () => abrirModal(item.codigo, item.zona, item.y, item.x);

                    if (item.zona === 'CONGELACION_G') {
                        gridCongelacionG.appendChild(caja);
                    } else if (item.zona === 'CONGELACION_H') {
                        gridCongelacionH.appendChild(caja);
                    } else if (item.zona === 'REFRIGERACION_I') {
                        gridRefrigeracionI.appendChild(caja);
                    } else if (item.zona === 'REFRIGERACION_J') {
                        gridRefrigeracionJ.appendChild(caja);
                    }

                    JsBarcode(svg, item.codigo, {
                        format: "CODE128",
                        width: 2,
                        height: 40,
                        fontSize: 16,
                        fontOptions: "bold",
                        textMargin: 2,
                        margin: 2,
                        displayValue: true
                    });
                });

            } catch (error) {
                console.error("Error leyendo los datos:", error);
                document.getElementById('grid-congelacion-g').innerHTML = '<div class="col-span-5 text-red-500 font-bold p-4">Error de formato en los datos JSON. Revisa la sintaxis.</div>';
            }
        }

        function abrirModal(codigo, zona, nivel, columna) {
            const modal = document.getElementById('modal-barcode');
            document.getElementById('modal-title').innerText = codigo;
            document.getElementById('modal-subtitle').innerText = `${zona} | Nivel: ${nivel} | Col: ${columna}`;
            const svg = document.getElementById('modal-svg');

            JsBarcode(svg, codigo, {
                format: "CODE128",
                width: 4,
                height: 120,
                fontSize: 24,
                fontOptions: "bold",
                margin: 0,
                displayValue: true
            });

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.firstElementChild.classList.remove('scale-95');
                modal.firstElementChild.classList.add('scale-100');
            }, 10);
        }

        function cerrarModal() {
            const modal = document.getElementById('modal-barcode');
            modal.classList.add('opacity-0');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function imprimirCuarto(idZona) {
            document.body.classList.add('modo-impresion');
            const zona = document.getElementById(idZona);
            zona.classList.add('activo-impresion');
            
            const limpiarImpresion = () => {
                document.body.classList.remove('modo-impresion');
                if(zona) zona.classList.remove('activo-impresion');
                window.removeEventListener('afterprint', limpiarImpresion);
            };
            
            window.addEventListener('afterprint', limpiarImpresion);
            setTimeout(() => {
                window.print();
                setTimeout(limpiarImpresion, 2000);
            }, 300);
        }

        window.onload = generarMapa;
    </script>
</body>
</html>
